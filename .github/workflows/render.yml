name: Render Video

on:
  workflow_dispatch:
    inputs:
      videoUrl:
        description: 'URL of the background video'
        required: true
        type: string
      audioUrl:
        description: 'URL of the audio'
        required: true
        type: string
      subtitleScript:
        description: 'JSON array for subtitles'
        required: true
        type: string
      callbackUrl:
        description: 'Webhook to POST result'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Prepare Props
        env:
          VIDEO_URL: ${{ github.event.inputs.videoUrl }}
          AUDIO_URL: ${{ github.event.inputs.audioUrl }}
          SUBTITLE_SCRIPT: ${{ github.event.inputs.subtitleScript }}
        run: |
          jq -n \
            --arg videoUrl "$VIDEO_URL" \
            --arg audioUrl "$AUDIO_URL" \
            --arg subtitleScript "$SUBTITLE_SCRIPT" \
            '{videoUrl: $videoUrl, audioUrl: $audioUrl, subtitleScript: $subtitleScript}' > props.json

      - name: Render Video
        run: npx remotion render src/index.ts MainRender out/video.mp4 --props=props.json

      - name: Post callback on success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"status":"success","message":"Render completed successfully"}' \
            ${{ github.event.inputs.callbackUrl }}
          
      - name: Post callback on failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"status":"error","message":"Render failed"}' \
            ${{ github.event.inputs.callbackUrl }}
